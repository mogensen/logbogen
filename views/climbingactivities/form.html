{{ $activity := .ClimbingActivity }}

<formset>
    <input type="hidden" id="csrf" name="csrf" value="{{ .csrf }}">
    {{ if .error }}
    <div class="alert alert-danger" role="alert">
        {{ .error }}
    </div>
    {{ end }}


    <div>
        <label for="climbingactivity-date" class="form-label mt-4">Date:</label>
        <input type="date" class="form-control" id="climbingactivity-date" name="date"
            value="{{fmtDate .ClimbingActivity.Date}}" required><br>
    </div>

    <div id="activity-form-map" data-lat="{{.ClimbingActivity.Lat}}" data-lng="{{.ClimbingActivity.Lng}}"></div>

    <input type="hidden" class="form-control" id="climbingactivity-lat" name="lat" value="{{.ClimbingActivity.Lat}}"
        required><br>
    <input type="hidden" class="form-control" id="climbingactivity-lng" name="lng" value="{{.ClimbingActivity.Lng}}"
        required><br>

    <div class="form-group">
        <label for="climbingactivity-type" class="form-label mt-4">Type:</label>
        <select id="climbingactivity-type" name="type" class="form-control">
            {{ range $key, $name := .ClimbingTypes }}
            <option value="{{ $key }}" {{if eq $key $activity.Type}}selected{{end}}>{{ $name }}</option>
            {{end}}
        </select>
    </div>

    <div class="form-group">
        <label for="climbingactivity-othertype" class="form-label mt-4">Anden Type:</label>
        <input type="text" class="form-control" id="climbingactivity-othertype" name="otherType"
            value="{{.ClimbingActivity.OtherType}}">
    </div>

    <div class="form-group">
        <label for="climbingactivity-role" class="form-label mt-4">Role:</label>
        <input type="text" class="form-control" id="climbingactivity-role" name="role"
            placeholder="Instruktør, deltager" value="{{.ClimbingActivity.Role}}" list="role-options">
        <datalist id="role-options">
            <option value="Instruktør">
            <option value="Deltager">
            <option value="Assistent">
            <option value="Tilskuer">
            <option value="Fotograf">
        </datalist>
    </div>

    <div>
        <label for="climbingactivity-comment" class="form-label mt-4">Kommentar:</label>
        <textarea class="form-control" id="climbingactivity-comment" name="comment"
            rows="10">{{.ClimbingActivity.Comment}}</textarea>
    </div>

    <div>
        <label for="climbingactivity-participants" class="form-label mt-4">Deltagere:</label>
        <select id="climbingactivity-participants" name="participants" class="form-control" multiple="multiple">
            {{ range .ClimbingActivity.Participants }}
            <option value="{{ .ID }}" selected>{{ .Name }}</option>
            {{end}}
        </select>
    </div>
    <br/>

    <button class="btn btn-success" role="submit">Save</button>
</formset>
