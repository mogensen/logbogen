{{ $activity := .SailingActivity }}

<formset>
    <input type="hidden" id="csrf" name="csrf" value="{{ .csrf }}">
    {{ if .error }}
    <div class="alert alert-danger" role="alert">
        {{ .error }}
    </div>
    {{ end }}

    <div>
        <label for="sailingactivity-date" class="form-label mt-4">Date:</label>
        <input type="date" class="form-control" id="sailingactivity-date" name="date"
            value="{{fmtDate .SailingActivity.Date}}" required><br>
    </div>

    <div id="activity-form-map" data-lat="{{.SailingActivity.Lat}}" data-lng="{{.SailingActivity.Lng}}"></div>

    <input type="hidden" class="form-control" id="sailingactivity-lat" name="lat" value="{{.SailingActivity.Lat}}"
        required><br>
    <input type="hidden" class="form-control" id="sailingactivity-lng" name="lng" value="{{.SailingActivity.Lng}}"
        required><br>

    <div class="form-group">
        <label for="sailingactivity-type" class="form-label mt-4">Type:</label>
        <select id="sailingactivity-type" name="type" class="form-control">
            {{ range $key, $name := .SailingTypes }}
            <option value="{{ $key }}" {{if eq $key $activity.Type}}selected{{end}}>{{ $name }}</option>
            {{end}}
        </select>
    </div>

    <div class="form-group">
        <label for="sailingactivity-othertype" class="form-label mt-4">Anden Type:</label>
        <input type="text" class="form-control" id="sailingactivity-othertype" name="otherType"
            value="{{.SailingActivity.OtherType}}">
    </div>

    <div>
        <label for="sailingactivity-role" class="form-label mt-4">Role:</label>
        <input type="text" class="form-control" id="sailingactivity-role" name="role"
            placeholder="Instruktør, deltager" value="{{.SailingActivity.Role}}" list="role-options">
        <datalist id="role-options">
            <option value="Instruktør">
            <option value="Deltager">
            <option value="Assistent">
            <option value="Tilskuer">
            <option value="Fotograf">
        </datalist>
    </div>

    <div>
        <label for="sailingactivity-comment" class="form-label mt-4">Kommentar:</label>
        <textarea class="form-control" id="sailingactivity-comment" name="comment"
            rows="10">{{.SailingActivity.Comment}}</textarea>
    </div>

    <div>
        <label for="sailingactivity-participants" class="form-label mt-4">Deltagere:</label>
        <select id="sailingactivity-participants" name="participants" class="form-control" multiple="multiple">
            {{ range .SailingActivity.Participants }}
            <option value="{{ .ID }}" selected>{{ .Name }}</option>
            {{end}}
        </select>
    </div>
    <br/>

    <button class="btn btn-success" role="submit">Save</button>
</formset>
