<style>
.act-edit-wrap { font-family: 'Patrick Hand', sans-serif; padding: 8px 0 32px; }
.act-edit-lbl { font-weight: 700; font-size: 11px; letter-spacing: .13em; text-transform: uppercase; color: var(--bs-secondary-color); margin-bottom: 6px; }
.act-edit-hd { font-family: 'Cabin Sketch', cursive; font-weight: 700; color: var(--bs-body-color); }

.act-edit-field {
  display: flex; align-items: center; width: 100%; box-sizing: border-box;
  border: 2px solid var(--bs-border-color); background: var(--bs-body-bg);
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; font-size: 17px;
  color: var(--bs-body-color); padding: 9px 14px;
  border-radius: 55px 225px 15px 25px / 25px 25px 35px 355px;
  appearance: none; -webkit-appearance: none;
}
.act-edit-field:focus { outline: none; box-shadow: none; border-color: var(--bs-border-color); }

.act-edit-pillrow { display: flex; flex-wrap: wrap; gap: 8px; }

.act-edit-pill {
  display: inline-flex; align-items: center; gap: 7px;
  border: 2px solid var(--bs-border-color); background: var(--bs-body-bg);
  border-radius: 25px 8px 25px 8px / 8px 25px 8px 25px;
  padding: 4px 15px 4px 7px;
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; font-size: 15px;
  color: var(--bs-body-color); cursor: pointer; transition: box-shadow .12s;
  user-select: none;
}
.act-edit-pill:hover { box-shadow: 2px 3px 0 rgba(51,51,51,.18); }
.act-edit-pill img { width: 24px; height: 24px; object-fit: contain; }
.act-edit-pill.sel { background: var(--bs-body-color); color: var(--bs-body-bg); }

.act-edit-ruled {
  width: 100%; box-sizing: border-box;
  border: 2px solid var(--bs-border-color);
  border-radius: 25px 15px 225px 55px / 25px 25px 35px 255px;
  background: repeating-linear-gradient(var(--bs-body-bg) 0 31px, var(--bs-tertiary-bg) 31px 32px);
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; font-size: 19px;
  line-height: 32px; color: var(--bs-body-color);
  padding: 7px 16px 14px; min-height: 150px; resize: vertical;
}

.act-edit-save {
  border: 2px solid #1f7a33; background: #2f9e44; color: #fff;
  font-family: 'Patrick Hand', sans-serif; font-weight: 700; font-size: 18px;
  white-space: nowrap; padding: 9px 30px;
  border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
  box-shadow: 2px 3px 0 rgba(51,51,51,.18); cursor: pointer;
}
.act-edit-cancel {
  border: 2px solid var(--bs-border-color); background: var(--bs-body-bg);
  color: var(--bs-body-color); font-family: 'Patrick Hand', sans-serif;
  font-weight: 700; font-size: 17px; padding: 8px 22px;
  border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
  cursor: pointer; text-decoration: none; display: inline-block;
}
.act-edit-cancel:hover { color: var(--bs-body-color); }

.act-edit-divEdge { border-top: 2px dashed var(--bs-border-color); margin: 18px 0; }
.act-edit-sep { height: 2px; background: var(--bs-border-color); margin: 18px 0 24px; }

.act-edit-header { display: flex; align-items: center; gap: 15px; }
.act-edit-header-actions { display: flex; gap: 10px; align-items: center; }
.act-edit-content { display: grid; grid-template-columns: 300px 1fr; gap: 34px; align-items: start; margin-top: 24px; }

#activity-form-map {
  width: 100%; height: 230px;
  border: 2px solid var(--bs-border-color);
  border-radius: 12px 8px 11px 9px / 9px 11px 8px 12px;
  overflow: hidden;
}

#act-edit-type-icon { transition: opacity .15s; }

.act-edit-actions-mobile { display: none; }

@media (max-width: 991px) {
  .act-edit-header-actions { display: none; }
  .act-edit-content { grid-template-columns: 1fr; gap: 0; }
  .act-edit-sidebar { order: 2; margin-top: 8px; }
  .act-edit-main { order: 1; }
  .act-edit-actions-mobile { display: flex; gap: 10px; margin-top: 22px; }
  .act-edit-actions-mobile .act-edit-save { flex: 1 1 auto; text-align: center; }
  #activity-form-map { height: 190px; }
  .act-edit-ruled { font-size: 17px; line-height: 30px; min-height: 110px; background: repeating-linear-gradient(var(--bs-body-bg) 0 29px, var(--bs-tertiary-bg) 29px 30px); }
}
</style>

<form method="POST" action="/activities/create" id="activity-form" class="act-edit-wrap needs-validation" novalidate>
  <input type="hidden" id="activity-lat" name="lat" value="{{.Activity.Lat}}">
  <input type="hidden" id="activity-lng" name="lng" value="{{.Activity.Lng}}">

  {{ if .error }}
  <div class="alert alert-danger" role="alert">{{ .error }}</div>
  {{ end }}

  <div class="act-edit-header">
    <img id="act-edit-type-icon" src="/images/activities/other.png" width="50" height="50" alt="" style="flex:none;opacity:0;">
    <div style="flex:1 1 auto;">
      <div class="act-edit-hd" style="font-size:30px;line-height:1;">Ny logning</div>
    </div>
    <div class="act-edit-header-actions">
      <a href="/activities/list" class="act-edit-cancel">Annuller</a>
      <button type="submit" class="act-edit-save">Gem logning</button>
    </div>
  </div>
  <div class="act-edit-sep"></div>

  <div class="act-edit-content">
    <!-- LEFT RAIL: date, role, participants -->
    <div class="act-edit-sidebar">
      <div class="act-edit-lbl">Dato</div>
      <input type="date" class="act-edit-field" id="activity-date" name="date" value="{{fmtDate .Activity.Date}}" required>

      <div class="act-edit-divEdge"></div>

      <div class="act-edit-lbl">Rolle</div>
      <input type="text" class="act-edit-field" id="activity-role" name="role"
        value="{{.Activity.Role}}" placeholder="Instruktør, deltager" list="role-options">
      <datalist id="role-options">
        <option value="Instruktør">
        <option value="Deltager">
        <option value="Assistent">
        <option value="Tilskuer">
        <option value="Fotograf">
      </datalist>

      <div class="act-edit-divEdge"></div>

      <div class="act-edit-lbl">Andre deltagere</div>
      <select id="participants" name="participants" class="form-control" multiple="multiple">
        {{range .Activity.Participants}}
        <option value="{{.ID}}" selected>{{.Name}}</option>
        {{end}}
      </select>
    </div>

    <!-- RIGHT MAIN: map, categories, types, comment -->
    <div class="act-edit-main">
      <div class="act-edit-lbl">Lokation</div>
      <div id="activity-form-map" data-lat="{{.Activity.Lat}}" data-lng="{{.Activity.Lng}}"></div>
      <div id="location-error" style="display:none;margin-top:8px;font-weight:700;font-size:14px;color:#dc3545;">
        Vælg venligst en lokation på kortet.
      </div>

      <div style="margin-top:22px;">
        <div class="act-edit-lbl">Aktivitets kategori</div>
        <div class="act-edit-pillrow" id="category-group" data-current="{{.Activity.Category.ID}}">
          <!-- populated by JS -->
        </div>
      </div>

      <div style="margin-top:18px;">
        <div class="act-edit-lbl">Aktivitets type</div>
        <div class="act-edit-pillrow" id="activity-type-group" data-current="{{.Activity.Type.ID}}">
          <!-- populated by JS -->
        </div>
        <div id="type-error" style="display:none;margin-top:8px;font-weight:700;font-size:14px;color:#dc3545;">
          Vælg venligst en aktivitetstype.
        </div>
      </div>

      <div style="margin-top:18px;display:none;" id="activity-othertype-group">
        <div class="act-edit-lbl">Anden type</div>
        <input type="text" class="act-edit-field" id="activity-othertype" name="otherType" value="{{.Activity.Type.Name}}" placeholder="Beskriv aktivitetstype">
        <div id="othertype-error" style="display:none;margin-top:8px;font-weight:700;font-size:14px;color:#dc3545;">
          Angiv venligst en aktivitetstype.
        </div>
      </div>

      <div style="margin-top:22px;">
        <div class="act-edit-lbl">Kommentar</div>
        <textarea class="act-edit-ruled" id="activity-comment" name="comment" rows="6">{{.Activity.Comment}}</textarea>
      </div>
    </div>
  </div>

  <div class="act-edit-actions-mobile">
    <button type="submit" class="act-edit-save">Gem logning</button>
    <a href="/activities/list" class="act-edit-cancel">Annuller</a>
  </div>
</form>

<script type="module">
  import { enableEscToNavigate } from '/js/keyboard.js';
  enableEscToNavigate('/activities/list');
</script>
