{{ $activity := .Activity }}

<formset id="activity-form">
    {{ if .error }}
    <div class="alert alert-danger" role="alert">
        {{ .error }}
    </div>
    {{ end }}


    <div>
        <label for="activity-date" class="form-label mt-4">Date:</label>
        <input type="date" class="form-control" id="activity-date" name="date" value="{{fmtDate .Activity.Date}}"
            required><br>
    </div>

    <div id="activity-form-map" data-lat="{{.Activity.Lat}}" data-lng="{{.Activity.Lng}}"></div>

    <input type="hidden" class="form-control" id="activity-lat" name="lat" value="{{.Activity.Lat}}" required><br>
    <input type="hidden" class="form-control" id="activity-lng" name="lng" value="{{.Activity.Lng}}" required><br>


    <div class="form-group">
        <label for="category-radio" class="form-label mt-4">Aktivitets kategori</label>
        <br />
        <div class="btn-group" role="group" aria-label="Basic radio toggle button group" id="category-group" data-current="{{.Activity.Category.ID}}">
            <!-- Categories will be dynamically added here -->
        </div>
    </div>

    <div class="form-group">
        <label for="activity-type" class="form-label mt-4">Aktivitets type</label>
        <br />
        <div class="btn-group category-radio-group  position-relative form-checks input-group has-validation" role="group" aria-label="Basic radio toggle button group"
            id="activity-type-group" data-current="{{.Activity.Type.ID}}">
            <!-- Radio buttons will be dynamically added here -->
        </div>
    </div>

    <div class="form-group" id="activity-othertype-group" style="display: none;">
        <label for="activity-othertype" class="form-label mt-4">Anden type</label>
        <input type="text" class="form-control" id="activity-othertype" name="otherType" value="{{.Activity.Type.Name}}">
    </div>

    <div class="form-group">
        <label for="activity-role" class="form-label mt-4">Role</label>
        <input type="text" class="form-control" id="activity-role" name="role" placeholder="Instruktør, deltager"
            value="{{.Activity.Role}}" list="role-options">
        <datalist id="role-options">
            <option value="Instruktør">
            <option value="Deltager">
            <option value="Assistent">
            <option value="Tilskuer">
            <option value="Fotograf">
        </datalist>
    </div>

    <div>
        <label for="activity-comment" class="form-label mt-4">Kommentar</label>
        <textarea class="form-control" id="activity-comment" name="comment" rows="10">{{.Activity.Comment}}</textarea>
    </div>

    <div>
        <label for="participants" class="form-label mt-4">Andre Deltagere</label>
        <select id="participants" name="participants" class="form-control" multiple="multiple">
            {{ range .Activity.Participants }}
            <option value="{{ .ID }}" selected>{{ .Name }}</option>
            {{end}}
        </select>
    </div>
    <br />

    <button class="btn btn-success" role="submit" id="submit-button">Save</button>
</formset>

<script>
document.getElementById('activity-form').addEventListener('submit', function(e) {
    const typeInput = document.getElementById('activity-type-input');
    if (!typeInput.value) {
        e.preventDefault();
        document.getElementById('type-error').style.display = 'block';
        return false;
    }
    return true;
});

// Add this to your existing JavaScript that handles the type selection
document.addEventListener('DOMContentLoaded', function() {
    const typeGroup = document.getElementById('activity-type-group');
    if (typeGroup) {
        typeGroup.addEventListener('click', function(e) {
            if (e.target.tagName === 'INPUT') {
                document.getElementById('activity-type-input').value = e.target.value;
                document.getElementById('type-error').style.display = 'none';
            }
        });
    }
});
</script>
