{{ $userID := .USER.ID }}

<div class="py-4 mb-2 d-flex justify-content-between">
  <div>
    <h1 class="d-inline-block">Klatre Logninger</h1>
  </div>
  <div>
    <a href="/activities/create" class="btn btn-primary">
      <i class="fas fa-clipboard-check"></i>&nbsp; Log ny klatretur
    </a>
  </div>
</div>

{{ if eq (len .Activities) 0 }}
<div class="d-flex flex-wrap-reverse justify-content-center">
  <div class="p-2 align-self-center">
  <p>
    Opret første logning med at trykke på
    <a href="/activities/create" class="btn btn-primary">
      <i class="fas fa-clipboard-check"></i>&nbsp; Log ny klatretur
    </a>
  </p>

  </div>
  <div class="p-2 ">
  <img src="/images/arrow.svg">
  </div>
</div>
{{end}}

<div class="card-body contacts_body">
  <ul class="contacts">
    {{ range .Activities }}
       {{ template "activities/card" (ctxActivity $userID .) }}
    {{end}}
  </ul>
</div>
