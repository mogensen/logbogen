    <h1>Login Page</h1>
	<p>Please login to access the protected route.</p>
	<form method="POST" action="/auth/signup" class="form-signin">
		<fieldset>

		<div>
			<label for="name" class="form-label mt-4">Name:</label>
			<input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
		</div>

		<div>
			<label for="email" class="form-label mt-4">Email:</label>
			<input type="text" class="form-control" id="email" name="email" required><br>
			<div data-lastpass-icon-root="" style="position: relative !important; height: 0px !important; width: 0px !important; float: left !important;"></div><small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
		</div>
	
		<div>
			<label for="password" class="form-label mt-4">Password:</label>
			<input type="password" class="form-control" id="password" name="password" required><br>
		</div>
		
		<input type="hidden" id="csrf" name="csrf" value="{{ .csrf }}">
		{{ if .error }}
		<p class="error">Error: {{ .error }}</p>
		{{ end }}
		<button type="submit" class="btn btn-primary">Login</button>
		</fieldset>
	</form>
