<div class="auth-center">
    <div class="login-form">
        <h2 class="text-center">Login</h2>

        {{ if .error }}
        <div class="alert alert-danger" role="alert">
            {{ .error }}
        </div>
        {{ end }}

        {{ if .DevMode }}
        <form method="POST" action="/auth/dev-login">
            <div>
                <label for="name" class="form-label mt-4">Name:</label>
                <input type="text" class="form-control" id="name" name="name">
            </div>
            <div>
                <label for="email" class="form-label mt-4">Email:</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn btn-block mt-4">Log ind (dev)</button>
            <p class="text-muted mt-2"><small>Dev login bypass — Auth0 is disabled in this environment.</small></p>
        </form>
        {{ else }}
        <p class="text-center mt-4">Log ind med din Auth0-konto.</p>
        <a href="/auth/login" class="btn btn-primary login-btn btn-block">Log ind med Auth0</a>
        {{ end }}
    </div>
</div>
